name: Helm Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  helm-lint:
    name: Helm Lint (${{ matrix.chart }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - aws/eks-fargate-use-ebs
          - aws/eks-fargate-use-efs
          - gcp/gke-use-firestore
          - gcp/gke-use-nfs-server
          - gcp/gke-use-pd-csi
          - onpremise/ke-use-nfs-server
          - onpremise/ke-use-nfs-server-sidecar-fluentbit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Helm Kustomize Lint
        uses: somaz94/helm-kustomize-lint-action@v1
        with:
          chart_path: ${{ matrix.chart }}
          lint_strict: 'false'

  drift-check:
    name: upgrade-sync drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run drift check
        run: ./scripts/upgrade-sync/sync.sh --check
