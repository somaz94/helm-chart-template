name: Backup GitHub to GitLab

on:
  push:
    branches:
      - main  # Sync on main branch changes
    paths-ignore:
      - .github/workflows/*
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history
          lfs: true       # Include Git LFS files
          
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Push to GitLab Mirror
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git remote add gitlab https://oauth2:${GITLAB_TOKEN}@gitlab.com/backup6695808/helm-chart-template.git
          git push -f --all gitlab   # Push all branches
          git push -f --tags gitlab  # Push all tags
        continue-on-error: true
