# Default values for admin.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: haproxy
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "3.0-dev6-alpine"

imagePullSecrets: []
nameOverride: "dev1-haproxy"
fullnameOverride: "dev1-haproxy"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  backendConfig:
    ports:
      http: dev1-haproxy

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.global-static-ip-name: "devqa-somaz-gke-dev1-multipath-lb-ip"
    networking.gke.io/managed-certificates: "dev1-haproxy"
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/v1beta1.FrontendConfig: dev1-haproxy
  hosts:
    - host: dev1-sm.example.com
      paths:
      - pathType: Prefix
        path: "/"
    - host: beta1-sm.example.com  
      paths:
      - pathType: Prefix
        path: "/"
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

mainContainer:
  volumeMounts:
    - mountPath: /usr/local/etc/haproxy/haproxy.cfg
      name: haproxy-config
      subPath: haproxy.cfg

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 500m
    memory: 512Mi
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

envConfig:
  NODE_ENV: dev1
  ENVIRONMENT: dev1

managedCertificate:
  domains: 
    - dev1-sm.example.com
    - beta1-sm.example.com

backendConfig:
  healthCheck:
    checkIntervalSec: 30
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /health
    port: 8080

frontendConfig:
  redirectToHttpsEnabled: true

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

revisionHistoryLimit: 2

namespace: haproxy
hasStaging: false

sidecars:
  enabled: false
  containers:
    # - name: promtail
    #   securityContext: {}
    #   image: grafana/promtail:master
    #   imagePullPolicy: IfNotPresent
    #   args:
    #     - "-config.file=/etc/promtail/promtail.yaml"
    #     - "-client.url=https://loki.mgmt.example.com/api/prom/push"
    #   volumeMounts:
    #     - name: shared-data
    #       mountPath: /etc/slog
    #     - name: promtail-config
    #       mountPath: /etc/promtail/promtail.yaml
    #       subPath: promtail.yaml

configs:
  - name: haproxy-configmap
    namespace: haproxy
    datas:
      haproxy.cfg: |
        # HAProxy global settings
        global
            log stdout format raw local0

        # Default settings for all frontends/backends
        defaults
            log global
            option httplog
            timeout connect 5000ms
            timeout client 50000ms
            timeout server 50000ms

        # Frontend for incoming requests
        frontend http_front
            bind *:8080
            mode http
            stats uri /haproxy?stats

            # ACLs checking whether the path is /game, /auth, /log, or /health
            acl health_check path /health
            acl path_game_somaz path_beg /game/somaz
            acl path_game path_beg /game
            acl path_auth path_beg /auth
            # acl path_log path_beg /log

            # Route requests to the appropriate backend based on conditions
            use_backend health_check_backend if health_check
            use_backend game_somaz_back if path_game_somaz
            use_backend game_back if path_game
            use_backend auth_back if path_auth
            # use_backend log_back if path_log

        # Backend for health checks
        backend health_check_backend
            mode http
            http-request return status 200 content-type text/plain string "OK"

        # Backend handling the "/game" path
        backend game_back
            mode http
            balance roundrobin
            # /game/x requests are rewritten to /x and forwarded to the game service
            http-request set-path %[path,regsub(^/game,/)]
            server game game.dev1-game.svc.cluster.local:80 check

        # Backend handling the "/game/somaz" path
        backend game_somaz_back
            mode http
            balance roundrobin
            # /game/somaz/x requests are forwarded to the game-somaz service
            http-request set-path %[path,regsub(^/game/somaz/game/somaz/,/game/somaz/)]
            server game-somaz game-somaz.dev1-game.svc.cluster.local:80 check

        # Backend handling the "/auth" path
        backend auth_back
            mode http
            balance roundrobin
            # /auth/x requests are rewritten to /x and forwarded to the auth service
            # http-request set-path %[path,regsub(^/auth/,/)]
            # /auth/x requests are forwarded to the auth service
            http-request set-path %[path,regsub(^/auth/auth/,/auth/)]
            server auth auth.dev1-auth.svc.cluster.local:80 check

        # Backend handling the "/log" path
        backend log_back
            mode http
            balance roundrobin
            # /log/x requests are rewritten to /x and forwarded to the log service
            # http-request set-path %[path,regsub(^/log/,/)]
            # /log/x requests are forwarded to the log service
            http-request set-path %[path,regsub(^/log/log/,/log/)]
            server log log.dev1-log.svc.cluster.local:80 check
