apiVersion: v1
kind: Service
metadata:
  name: {{ include "gke-use-nfs-server.fullname" . }}
  labels:
    {{- include "gke-use-nfs-server.labels" . | nindent 4 }}
  annotations:
    cloud.google.com/backend-config: '{{ .Values.service.backendConfig | toJson }}'
    cloud.google.com/neg: '{"ingress":true}'
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "gke-use-nfs-server.selectorLabels" . | nindent 4 }}
