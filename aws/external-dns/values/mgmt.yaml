# External-DNS Route53 Configuration
image:
  repository: registry.k8s.io/external-dns/external-dns
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations:
    # EKS IAM Role for Service Account (IRSA) - replace with the actual Role ARN
    eks.amazonaws.com/role-arn: arn:aws:iam::010xxxxxxxxx:role/external-dns-role

# Deploy on the system nodegroup
nodeSelector:
  eks.amazonaws.com/nodegroup: Somaz-NodeGroup-worker-node

# Pod security settings
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65534

securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: ["ALL"]

rbac:
  create: true

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Log settings
logLevel: info
logFormat: text

# # Monitor only the tertiary-project namespace
# namespaced: true

# DNS update interval
interval: 5m

# Resource types to monitor
sources:
  - service
  - ingress

# DNS record management policy
policy: upsert-only # Policy: create if missing, update if present

# TXT record registry settings
registry: txt
txtOwnerId: "somaz-external-dns"
txtPrefix: "external-dns-"

# Domain filter - manage only tertiary-project.example.com
domainFilters:
  - example.com

# AWS Route53 provider
provider:
  name: aws

# Additional External-DNS settings
extraArgs:
  - --aws-zone-type=public
  - --aws-prefer-cname